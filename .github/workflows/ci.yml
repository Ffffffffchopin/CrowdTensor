name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Compile
        run: python -m py_compile coordinator.py miner_cli.py scripts/*.py crowdtensor/*.py
      - name: Release gate
        run: python scripts/release_gate.py --json
      - name: Security preflight
        run: python scripts/security_preflight.py --json
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Outer optimizer smoke
        if: matrix.python-version == '3.12'
        run: python scripts/outer_optimizer_check.py --port 8899
      - name: Compressed error feedback smoke
        if: matrix.python-version == '3.12'
        run: python scripts/compressed_error_feedback_check.py --port 8900
      - name: Delta transport negotiation smoke
        if: matrix.python-version == '3.12'
        run: python scripts/delta_transport_negotiation_check.py --port 8901
      - name: Model bundle smoke
        if: matrix.python-version == '3.12'
        run: python scripts/model_bundle_smoke.py --port 8902
      - name: Runtime acceptance
        if: matrix.python-version == '3.12'
        run: python scripts/runtime_acceptance_pack.py --base-port 8910 --check-timeout 180 --report /tmp/crowdtensor_acceptance.json
      - name: Browser acceptance
        if: matrix.python-version == '3.12'
        run: python scripts/browser_acceptance_pack.py --allow-skip --base-port 9310 --check-timeout 180 --report /tmp/crowdtensor_browser_acceptance.json
