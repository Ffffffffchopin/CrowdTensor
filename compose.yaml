services:
  coordinator:
    build: .
    ports:
      - "8787:8787"
    environment:
      CROWDTENSOR_ADMIN_TOKEN: ${CROWDTENSOR_ADMIN_TOKEN:-local-admin}
      CROWDTENSOR_MINER_TOKEN: ${CROWDTENSOR_MINER_TOKEN:-local-miner}
      CROWDTENSOR_OBSERVER_TOKEN: ${CROWDTENSOR_OBSERVER_TOKEN:-local-observer}
    volumes:
      - crowdtensor-state:/data
    command:
      - crowdtensord
      - --host
      - 0.0.0.0
      - --port
      - "8787"
      - --state-dir
      - /data/state
      - --miner-token
      - ${CROWDTENSOR_MINER_TOKEN:-local-miner}
      - --observer-token
      - ${CROWDTENSOR_OBSERVER_TOKEN:-local-observer}
      - --admin-token
      - ${CROWDTENSOR_ADMIN_TOKEN:-local-admin}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8787/ready', timeout=2)); raise SystemExit(0 if data.get('ok') is True else 1)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  miner:
    build: .
    depends_on:
      - coordinator
    environment:
      CROWDTENSOR_MINER_TOKEN: ${CROWDTENSOR_MINER_TOKEN:-local-miner}
    command:
      - crowdtensor-miner
      - --coordinator
      - http://coordinator:8787
      - --miner-id
      - compose-miner-1
      - --max-tasks
      - "1"
      - --idle-sleep
      - "1"

  web:
    image: python:3.12-slim
    working_dir: /app
    ports:
      - "8765:8765"
    volumes:
      - ./web:/app/web:ro
    command:
      - python
      - -m
      - http.server
      - "8765"
      - --bind
      - 0.0.0.0
      - --directory
      - web

volumes:
  crowdtensor-state:
