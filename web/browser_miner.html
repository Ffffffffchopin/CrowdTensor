<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrowdTensor Browser Miner</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #101417;
        --panel: #f7f8f4;
        --ink: #111416;
        --muted: #5c656b;
        --line: #d9ddd5;
        --accent: #176f5c;
        --warn: #a34c16;
        --bad: #a4262c;
        --good: #14804a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        min-height: 100vh;
        background: #eef1ea;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 64px;
        padding: 14px clamp(16px, 4vw, 44px);
        background: #101417;
        color: #f7f8f4;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand strong {
        font-size: 18px;
        letter-spacing: 0;
      }

      .brand span,
      .mode span {
        color: #b9c2bc;
        font-size: 13px;
      }

      .mode {
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .status-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--warn);
        margin-right: 7px;
      }

      .status-dot.good {
        background: var(--good);
      }

      .status-dot.bad {
        background: var(--bad);
      }

      .workspace {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 38px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.7fr);
        gap: 18px;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      h1,
      h2 {
        margin: 0;
        line-height: 1.15;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(24px, 4vw, 42px);
      }

      h2 {
        font-size: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      input {
        width: 100%;
        min-height: 40px;
        border: 1px solid #b9c2bc;
        border-radius: 8px;
        padding: 8px 10px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
      }

      .controls,
      .fields {
        display: grid;
        gap: 10px;
      }

      .controls {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      button {
        min-height: 40px;
        border-radius: 8px;
        border: 1px solid #104f42;
        background: var(--accent);
        color: #ffffff;
        font-weight: 650;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #104f42;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 18px;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #ffffff;
        min-height: 72px;
      }

      .metric span {
        color: var(--muted);
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
      }

      .metric strong {
        display: block;
        font-size: 20px;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .log {
        height: 260px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        background: #101417;
        color: #dfe7e1;
        border-radius: 8px;
        padding: 12px;
      }

      .log div {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      @media (max-width: 780px) {
        .grid,
        .controls,
        .metrics {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .mode {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div class="brand">
          <strong>CrowdTensorD Browser Miner</strong>
          <span>HTTP task bridge with Worker-side DiLoCo</span>
        </div>
        <div class="mode">
          <span><i id="statusDot" class="status-dot"></i><span id="statusLabel">booting</span></span>
        </div>
      </div>

      <div class="workspace">
        <div class="grid">
          <section>
            <h1>Browser miner</h1>
            <div class="fields" style="margin-top: 18px">
              <label>
                Coordinator
                <input id="coordinatorInput" autocomplete="off" spellcheck="false">
              </label>
              <label>
                Miner ID
                <input id="minerIdInput" autocomplete="off" spellcheck="false">
              </label>
              <label>
                Miner Token
                <input id="minerTokenInput" type="password" autocomplete="off" spellcheck="false">
              </label>
            </div>
            <div class="controls" style="margin-top: 14px">
              <button id="runOnceButton" type="button">Run once</button>
              <button id="autoLoopButton" type="button" class="secondary">Auto loop</button>
              <button id="stopButton" type="button" class="secondary">Stop</button>
            </div>
          </section>

          <section>
            <h2>Runtime</h2>
            <div class="metrics">
              <div class="metric"><span>Task</span><strong id="taskMetric">-</strong></div>
              <div class="metric"><span>Model</span><strong id="modelMetric">0</strong></div>
              <div class="metric"><span>Step</span><strong id="stepMetric">0</strong></div>
              <div class="metric"><span>Loss</span><strong id="lossMetric">-</strong></div>
              <div class="metric"><span>Heartbeats</span><strong id="heartbeatMetric">0</strong></div>
              <div class="metric"><span>Worker</span><strong id="workerMetric">-</strong></div>
            </div>
          </section>
        </div>

        <section style="margin-top: 18px">
          <h2>Event Log</h2>
          <div id="log" class="log" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <script src="./browser_miner.js"></script>
  </body>
</html>
